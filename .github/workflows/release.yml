name: '[old] Release'

on:
  push:
    branches:
      - main
    paths:
      - 'SyncFactors.Old/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      version:
        description: Stable SemVer version to publish for the legacy SyncFactors.Old bundle. Must match the legacy VERSION file at the target ref.
        required: true
        type: string
      target_ref:
        description: Branch, tag, or commit SHA to release.
        required: false
        default: main
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prerelease:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve prerelease metadata
        id: release_info
        shell: pwsh
        run: |
          $info = & ./SyncFactors.Old/scripts/Get-SyncFactorsReleaseInfo.ps1 -Channel Prerelease -RunNumber $env:GITHUB_RUN_NUMBER -CommitSha $env:GITHUB_SHA
          "version=$($info.version)" >> $env:GITHUB_OUTPUT
          "tag=$($info.tag)" >> $env:GITHUB_OUTPUT
          "commit_sha=$($info.commitSha)" >> $env:GITHUB_OUTPUT

      - name: Build deployment bundle
        id: bundle
        shell: pwsh
        run: |
          New-Item -Path ./artifacts/releases -ItemType Directory -Force | Out-Null
          $bundlePath = Join-Path (Resolve-Path ./artifacts/releases) "syncfactors-old-${{ steps.release_info.outputs.version }}.zip"
          $bundle = & ./SyncFactors.Old/scripts/New-SyncFactorsReleaseBundle.ps1 -OutputPath $bundlePath
          "bundle_path=$($bundle.bundlePath)" >> $env:GITHUB_OUTPUT

      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${{ steps.release_info.outputs.tag }}" "${{ steps.bundle.outputs.bundle_path }}" \
            --repo "${{ github.repository }}" \
            --target "${{ steps.release_info.outputs.commit_sha }}" \
            --title "${{ steps.release_info.outputs.version }}" \
            --prerelease \
            --latest=false \
            --generate-notes

  stable-release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out target ref
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.target_ref }}

      - name: Resolve stable release metadata
        id: release_info
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        shell: pwsh
        run: |
          $commitSha = (git rev-parse HEAD).Trim()
          $info = & ./SyncFactors.Old/scripts/Get-SyncFactorsReleaseInfo.ps1 -Channel Stable -Version $env:RELEASE_VERSION -CommitSha $commitSha
          "version=$($info.version)" >> $env:GITHUB_OUTPUT
          "tag=$($info.tag)" >> $env:GITHUB_OUTPUT
          "commit_sha=$($info.commitSha)" >> $env:GITHUB_OUTPUT

      - name: Detect SyncFactors.Old changes in release commit
        id: legacy_changes
        shell: pwsh
        env:
          RELEASE_COMMIT_SHA: ${{ steps.release_info.outputs.commit_sha }}
        run: |
          $changedFiles = git diff-tree --no-commit-id --name-only -r $env:RELEASE_COMMIT_SHA -- 'SyncFactors.Old'
          if ([string]::IsNullOrWhiteSpace(($changedFiles | Out-String))) {
              "changed=false" >> $env:GITHUB_OUTPUT
          } else {
              "changed=true" >> $env:GITHUB_OUTPUT
          }

      - name: Verify required CI checks succeeded
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
          RELEASE_COMMIT_SHA: ${{ steps.release_info.outputs.commit_sha }}
          LEGACY_CHANGED: ${{ steps.legacy_changes.outputs.changed }}
        shell: pwsh
        run: |
          $requiredContexts = @(
              'dotnet',
              'Semgrep Security SAST',
              'Gitleaks Secret Scan',
              'Trivy Repository Scan'
          )

          if ($env:LEGACY_CHANGED -eq 'true') {
              $requiredContexts += @(
                  '[old] pester',
                  '[old] PowerShell Static Analysis'
              )
          }

          $status = gh api "repos/$env:GITHUB_REPOSITORY_NAME/commits/$env:RELEASE_COMMIT_SHA/status" | ConvertFrom-Json -Depth 20
          $latestByContext = @{}
          foreach ($entry in $status.statuses) {
              if (-not $latestByContext.ContainsKey($entry.context)) {
                  $latestByContext[$entry.context] = $entry.state
              }
          }

          $missingContexts = @()
          $failedContexts = @()
          foreach ($context in $requiredContexts) {
              if (-not $latestByContext.ContainsKey($context)) {
                  $missingContexts += $context
                  continue
              }

              if ($latestByContext[$context] -ne 'success') {
                  $failedContexts += "$context=$($latestByContext[$context])"
              }
          }

          if ($missingContexts.Count -gt 0) {
              throw "Stable release is blocked because required CI contexts are missing: $($missingContexts -join ', ')"
          }

          if ($failedContexts.Count -gt 0) {
              throw "Stable release is blocked because required CI contexts are not green: $($failedContexts -join ', ')"
          }

      - name: Build deployment bundle
        id: bundle
        shell: pwsh
        run: |
          New-Item -Path ./artifacts/releases -ItemType Directory -Force | Out-Null
          $bundlePath = Join-Path (Resolve-Path ./artifacts/releases) "syncfactors-old-${{ steps.release_info.outputs.version }}.zip"
          $bundle = & ./SyncFactors.Old/scripts/New-SyncFactorsReleaseBundle.ps1 -OutputPath $bundlePath
          "bundle_path=$($bundle.bundlePath)" >> $env:GITHUB_OUTPUT

      - name: Publish stable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${{ steps.release_info.outputs.tag }}" "${{ steps.bundle.outputs.bundle_path }}" \
            --repo "${{ github.repository }}" \
            --target "${{ steps.release_info.outputs.commit_sha }}" \
            --title "${{ steps.release_info.outputs.version }}" \
            --generate-notes
