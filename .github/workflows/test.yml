name: Test

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pester:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Install SQLite CLI
        shell: pwsh
        run: |
          choco install sqlite --version=3.52.0 --no-progress -y
          "$env:ChocolateyInstall\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          sqlite3 --version

      - name: Run tests with coverage summary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ./artifacts | Out-Null
          ./scripts/Invoke-TestSuite.ps1 -Detailed -Coverage -CoverageSummaryPath ./artifacts/test-coverage-summary.json 2>&1 |
            Tee-Object -FilePath ./artifacts/pester-output.txt

      - name: Upload coverage summary
        if: always() && hashFiles('artifacts/test-coverage-summary.json') != ''
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-coverage-summary
          path: artifacts/test-coverage-summary.json

      - name: Upload Pester output
        if: always() && hashFiles('artifacts/pester-output.txt') != ''
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pester-output
          path: artifacts/pester-output.txt
