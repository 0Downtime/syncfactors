name: Test

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet:
    name: dotnet
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        run: dotnet restore ./SyncFactors.Next.sln

      - name: Run .NET test suite
        run: dotnet test ./SyncFactors.Next.sln --configuration Release --no-restore --logger "trx;LogFileName=test-results.trx" --results-directory ./artifacts/test-results

      - name: Upload .NET test results
        if: always() && hashFiles('artifacts/test-results/*.trx') != ''
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dotnet-test-results
          path: artifacts/test-results/*.trx
