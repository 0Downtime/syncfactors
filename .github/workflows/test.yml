name: Test

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions: {}

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet:
    name: dotnet
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        run: dotnet restore ./SyncFactors.Next.sln

      - name: Build solution
        run: dotnet build ./SyncFactors.Next.sln --configuration Release --no-restore

      - name: Run .NET test suite
        run: dotnet test ./SyncFactors.Next.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory ./artifacts/test-results

      - name: Install CycloneDX
        run: dotnet tool install --global CycloneDX --version 5.5.0

      - name: Generate SBOM
        run: ~/.dotnet/tools/dotnet-CycloneDX ./SyncFactors.Next.sln --output ./artifacts/sbom --json

      - name: Attest SBOM build provenance
        if: hashFiles('artifacts/sbom/*') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-path: artifacts/sbom/*

      - name: Upload SBOM
        if: always() && hashFiles('artifacts/sbom/*') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: artifacts/sbom/*

      - name: Upload .NET test results
        if: always() && hashFiles('artifacts/test-results/*.trx') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dotnet-test-results
          path: artifacts/test-results/*.trx
