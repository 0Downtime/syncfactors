name: Test

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet:
    name: dotnet
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        run: dotnet restore ./SyncFactors.Next.sln

      - name: Run .NET test suite
        run: dotnet test ./SyncFactors.Next.sln --configuration Release --no-restore --logger "trx;LogFileName=test-results.trx" --results-directory ./artifacts/test-results

      - name: Upload .NET test results
        if: always() && hashFiles('artifacts/test-results/*.trx') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dotnet-test-results
          path: artifacts/test-results/*.trx

  pester:
    name: '[old] pester'
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Install SQLite CLI
        shell: pwsh
        run: |
          choco install sqlite --version=3.52.0 --no-progress -y
          "$env:ChocolateyInstall\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          sqlite3 --version

      - name: Run tests with coverage summary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ./artifacts | Out-Null
          ./SyncFactors.Old/scripts/Invoke-TestSuite.ps1 -Detailed -Coverage -CoverageSummaryPath ./artifacts/test-coverage-summary.json 2>&1 |
            Tee-Object -FilePath ./artifacts/pester-output.txt

      - name: Upload coverage summary
        if: always() && hashFiles('artifacts/test-coverage-summary.json') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-coverage-summary
          path: artifacts/test-coverage-summary.json

      - name: Upload Pester output
        if: always() && hashFiles('artifacts/pester-output.txt') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pester-output
          path: artifacts/pester-output.txt
