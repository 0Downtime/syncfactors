name: Legacy SonarCloud

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'SyncFactors.Old/**'
      - '.github/workflows/sonarcloud.yml'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: sonarcloud-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: windows-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Install SQLite CLI
        shell: pwsh
        run: |
          choco install sqlite --no-progress -y
          "$env:ChocolateyInstall\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          sqlite3 --version

      - name: Run legacy tests with coverage for SonarCloud
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ./artifacts | Out-Null
          Set-Location ./SyncFactors.Old
          ./scripts/Invoke-TestSuite.ps1 `
            -Coverage `
            -CoverageReportPath ../artifacts/coverage.xml `
            -CoverageReportFormat JaCoCo `
            -TestResultPath ../artifacts/test-results.xml `
            -TestResultFormat JUnitXml

      - name: Run legacy SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        with:
          args: >
            "-Dsonar.projectBaseDir=SyncFactors.Old"
            "-Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}"
            "-Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}"
