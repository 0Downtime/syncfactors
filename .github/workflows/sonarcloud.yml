name: '[old] SonarCloud'

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'SyncFactors.Old/**'
      - '.github/workflows/sonarcloud.yml'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: sonarcloud-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  legacy-changes:
    name: Detect legacy changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect SyncFactors.Old changes
        id: filter
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "$base" "$head" -- SyncFactors.Old; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  scan:
    name: '[old] Quality and Coverage'
    needs: legacy-changes
    if: needs.legacy-changes.outputs.changed == 'true'
    runs-on: windows-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Install SQLite CLI
        shell: pwsh
        run: |
          choco install sqlite --version=3.52.0 --no-progress -y
          "$env:ChocolateyInstall\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          sqlite3 --version

      - name: Run legacy tests with coverage for SonarCloud
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ./artifacts | Out-Null
          Set-Location ./SyncFactors.Old
          ./scripts/Invoke-TestSuite.ps1 `
            -Coverage `
            -CoverageReportPath ../artifacts/coverage.xml `
            -CoverageReportFormat JaCoCo `
            -TestResultPath ../artifacts/test-results.xml `
            -TestResultFormat JUnitXml

      - name: Run SonarCloud scan
        # nosemgrep: generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        with:
          args: >
            "-Dsonar.projectBaseDir=SyncFactors.Old"
            "-Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}"
            "-Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}"
