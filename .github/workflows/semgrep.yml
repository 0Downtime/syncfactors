name: Semgrep

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: semgrep-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Semgrep CE Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Run Semgrep
        shell: sh
        run: |
          # Semgrep misclassifies the pinned Sonar action reference as a secret.
          semgrep scan \
            --config auto \
            --config .semgrep/powershell-security.yml \
            --exclude .github/workflows/sonarcloud.yml \
            --sarif \
            --output semgrep.sarif \
            --error \
            .

      - name: Upload Semgrep SARIF
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
        with:
          sarif_file: semgrep.sarif
          category: /semgrep
