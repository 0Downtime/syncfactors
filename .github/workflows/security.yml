name: Security Scans

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: '23 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep Security SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep@sha256:0262773354961f6bbee2ad0d2716296e0d2a8633a8525875215cdc5cfc53e8f2 # 1.127.0
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Semgrep
        shell: sh
        run: |
          semgrep scan \
            --config auto \
            --sarif \
            --output semgrep.sarif \
            --error \
            .

      - name: Upload Semgrep SARIF
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: semgrep.sarif
          category: /semgrep

  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install Gitleaks
        shell: bash
        env:
          GITLEAKS_VERSION: 8.24.3
          GITLEAKS_ARCHIVE: gitleaks_8.24.3_linux_x64.tar.gz
          GITLEAKS_ARCHIVE_SHA256: 9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bin"
          archive_path="$RUNNER_TEMP/$GITLEAKS_ARCHIVE"
          curl -fsSLo "$archive_path" "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${GITLEAKS_ARCHIVE}"
          echo "${GITLEAKS_ARCHIVE_SHA256}  ${archive_path}" | sha256sum -c -
          tar -xzf "$archive_path" -C "$RUNNER_TEMP"
          install -m 0755 "$RUNNER_TEMP/gitleaks" "$RUNNER_TEMP/bin/gitleaks"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Run Gitleaks SARIF report
        id: gitleaks_scan
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          gitleaks git \
            --report-format sarif \
            --report-path gitleaks-results.sarif \
            --exit-code 1 \
            --log-opts="--all" \
            .

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: gitleaks-results.sarif
          category: /gitleaks

      - name: Enforce Gitleaks result
        if: always() && steps.gitleaks_scan.outcome == 'failure'
        shell: bash
        run: |
          echo "Gitleaks reported secrets or encountered an execution error."
          exit 1

  trivy-repository-scan:
    name: Trivy Repository Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Trivy
        shell: bash
        env:
          TRIVY_VERSION: 0.69.3
          TRIVY_ARCHIVE: trivy_0.69.3_Linux-64bit.tar.gz
          TRIVY_ARCHIVE_SHA256: 1816b632dfe529869c740c0913e36bd1629cb7688bd5634f4a858c1d57c88b75
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bin"
          archive_path="$RUNNER_TEMP/$TRIVY_ARCHIVE"
          curl -fsSLo "$archive_path" "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/${TRIVY_ARCHIVE}"
          echo "${TRIVY_ARCHIVE_SHA256}  ${archive_path}" | sha256sum -c -
          tar -xzf "$archive_path" -C "$RUNNER_TEMP"
          install -m 0755 "$RUNNER_TEMP/trivy" "$RUNNER_TEMP/bin/trivy"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Run Trivy SARIF report
        id: trivy_sarif
        shell: bash
        env:
          TRIVY_DEBUG: true
        run: |
          trivy fs \
            --quiet \
            --format sarif \
            --output trivy-results.sarif \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --scanners vuln,misconfig \
            .

      - name: Upload Trivy results
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: trivy-results.sarif

      - name: Fail on Trivy findings
        id: trivy_enforce
        if: always()
        continue-on-error: true
        shell: bash
        env:
          TRIVY_DEBUG: true
        run: |
          trivy fs \
            --quiet \
            --format table \
            --output trivy-results.txt \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --scanners vuln,misconfig \
            .

      - name: Upload Trivy diagnostic artifacts
        if: always() && (hashFiles('trivy-results.txt') != '' || hashFiles('trivy-results.sarif') != '')
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: trivy-diagnostics
          path: |
            trivy-results.txt
            trivy-results.sarif
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish Trivy summary
        if: always() && hashFiles('trivy-results.txt') != ''
        shell: bash
        run: |
          {
            echo "### Trivy Output"
            echo "<details><summary>Click to expand</summary>"
            echo
            echo '```text'
            cat trivy-results.txt
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce Trivy result
        if: always() && steps.trivy_enforce.outcome == 'failure'
        shell: bash
        run: |
          echo "Trivy enforcement scan reported HIGH/CRITICAL findings or an execution error."
          exit 1
