name: Security

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: '23 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  powershell-static-analysis:
    name: PowerShell Static Analysis
    runs-on: windows-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Run PSScriptAnalyzer on src
        id: pssa_src
        continue-on-error: true
        uses: microsoft/psscriptanalyzer-action@v1.0
        with:
          path: .\src
          recurse: true
          settings: .\PSScriptAnalyzerSettings.psd1
          severity: '"Error", "Warning"'
          enableExit: true
          output: results-src.sarif

      - name: Run PSScriptAnalyzer on scripts
        id: pssa_scripts
        continue-on-error: true
        uses: microsoft/psscriptanalyzer-action@v1.0
        with:
          path: .\scripts
          recurse: true
          settings: .\PSScriptAnalyzerSettings.psd1
          severity: '"Error", "Warning"'
          enableExit: true
          output: results-scripts.sarif

      - name: Upload PSScriptAnalyzer SARIF for src
        if: always() && hashFiles('results-src.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results-src.sarif

      - name: Upload PSScriptAnalyzer SARIF for scripts
        if: always() && hashFiles('results-scripts.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results-scripts.sarif

      - name: Enforce PSScriptAnalyzer result
        if: always() && (steps.pssa_src.outcome == 'failure' || steps.pssa_scripts.outcome == 'failure')
        shell: pwsh
        run: |
          throw 'PSScriptAnalyzer reported one or more Error/Warning findings.'

  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy-repository-scan:
    name: Trivy Repository Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.3
        with:
          version: v0.69.3
          cache: true

      - name: Run Trivy SARIF report
        id: trivy_sarif
        shell: bash
        env:
          TRIVY_DEBUG: true
        run: |
          trivy fs \
            --quiet \
            --format sarif \
            --output trivy-results.sarif \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --scanners vuln,secret,misconfig \
            .

      - name: Generate Trivy JSON report
        if: always()
        shell: bash
        env:
          TRIVY_DEBUG: true
        run: |
          trivy fs \
            --quiet \
            --format json \
            --output trivy-results.json \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --scanners vuln,secret,misconfig \
            .

      - name: Upload Trivy results
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Fail on Trivy findings
        id: trivy_enforce
        if: always()
        continue-on-error: true
        shell: bash
        env:
          TRIVY_DEBUG: true
        run: |
          trivy fs \
            --quiet \
            --format table \
            --output trivy-results.txt \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --scanners vuln,secret,misconfig \
            .

      - name: Upload Trivy diagnostic artifacts
        if: always() && (hashFiles('trivy-results.json') != '' || hashFiles('trivy-results.txt') != '' || hashFiles('trivy-results.sarif') != '')
        uses: actions/upload-artifact@v4
        with:
          name: trivy-diagnostics
          path: |
            trivy-results.json
            trivy-results.txt
            trivy-results.sarif
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish Trivy summary
        if: always() && hashFiles('trivy-results.txt') != ''
        shell: bash
        run: |
          {
            echo "### Trivy Output"
            echo "<details><summary>Click to expand</summary>"
            echo
            echo '```text'
            cat trivy-results.txt
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce Trivy result
        if: always() && steps.trivy_enforce.outcome == 'failure'
        shell: bash
        run: |
          echo "Trivy enforcement scan reported HIGH/CRITICAL findings or an execution error."
          exit 1
