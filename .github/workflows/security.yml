name: Security Scans

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: '23 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep Security SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Semgrep
        shell: sh
        run: |
          semgrep scan \
            --config auto \
            --sarif \
            --output semgrep.sarif \
            --error \
            .

      - name: Upload Semgrep SARIF
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: semgrep.sarif
          category: /semgrep

  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy-repository-scan:
    name: Trivy Repository Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
        with:
          version: v0.69.3
          cache: true

      - name: Run Trivy SARIF report
        id: trivy_sarif
        shell: bash
        env:
          TRIVY_DEBUG: true
        run: |
          trivy fs \
            --quiet \
            --format sarif \
            --output trivy-results.sarif \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --scanners vuln,misconfig \
            .

      - name: Upload Trivy results
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: trivy-results.sarif

      - name: Fail on Trivy findings
        id: trivy_enforce
        if: always()
        continue-on-error: true
        shell: bash
        env:
          TRIVY_DEBUG: true
        run: |
          trivy fs \
            --quiet \
            --format table \
            --output trivy-results.txt \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --scanners vuln,misconfig \
            .

      - name: Upload Trivy diagnostic artifacts
        if: always() && (hashFiles('trivy-results.txt') != '' || hashFiles('trivy-results.sarif') != '')
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: trivy-diagnostics
          path: |
            trivy-results.txt
            trivy-results.sarif
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish Trivy summary
        if: always() && hashFiles('trivy-results.txt') != ''
        shell: bash
        run: |
          {
            echo "### Trivy Output"
            echo "<details><summary>Click to expand</summary>"
            echo
            echo '```text'
            cat trivy-results.txt
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce Trivy result
        if: always() && steps.trivy_enforce.outcome == 'failure'
        shell: bash
        run: |
          echo "Trivy enforcement scan reported HIGH/CRITICAL findings or an execution error."
          exit 1
