<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="favicon-title favicon-desc">
  <title id="favicon-title">SyncFactors Favicon</title>
  <desc id="favicon-desc">Sync arrows wrapped around a data grid tile.</desc>
  <defs>
    <linearGradient id="sf-orange" x1="14" y1="14" x2="33" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffb13a" />
      <stop offset="1" stop-color="#ff7a00" />
    </linearGradient>
    <linearGradient id="sf-blue" x1="24" y1="22" x2="48" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2c7cff" />
      <stop offset="1" stop-color="#0f55cf" />
    </linearGradient>
    <linearGradient id="sf-navy" x1="22" y1="18" x2="48" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1962de" />
      <stop offset="1" stop-color="#061d58" />
    </linearGradient>
    <filter id="sf-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#06224f" flood-opacity="0.18" />
    </filter>
  </defs>

  <g filter="url(#sf-shadow)">
    <path
      d="M20 18c5.8-2.5 13-2.8 19-0.8l-2.4 4.5 11.4-0.4L41.8 12l-2.5 4.5c-7.4-2.3-15.7-1.8-22.7 1.4z"
      fill="url(#sf-orange)" />

    <path
      d="M44 46c-5.8 2.5-13 2.8-19 0.8l2.4-4.5-11.4 0.4 6.2 9.3 2.5-4.5c7.4 2.3 15.7 1.8 22.7-1.4z"
      fill="url(#sf-blue)" />

    <rect x="21" y="18" width="22" height="22" rx="4.5" fill="url(#sf-navy)" stroke="#0f55cf" stroke-width="1.8" />

    <rect x="25.5" y="22.5" width="5.4" height="5.4" rx="1.1" fill="#ffffff" />
    <rect x="33.1" y="22.5" width="5.4" height="5.4" rx="1.1" fill="#ffffff" />
    <rect x="25.5" y="30.1" width="5.4" height="5.4" rx="1.1" fill="#ffffff" />
    <rect x="33.1" y="30.1" width="5.4" height="5.4" rx="1.1" fill="#ffffff" />
  </g>
</svg>
